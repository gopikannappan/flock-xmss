<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 764 360" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#c9700a"/>
    </marker>
  </defs>

  <!-- self-contained background (readable on light and dark GitHub themes) -->
  <rect x="0.5" y="0.5" width="763" height="359" rx="14" fill="#ffffff" stroke="#dfe5ec"/>

  <!-- message binding callout -->
  <rect x="150" y="20" width="330" height="34" rx="8" fill="#fbefdd" stroke="#c9700a"/>
  <text x="315" y="42" text-anchor="middle" font-size="13" fill="#8a4d06">the message decides how far each chain walks</text>
  <path d="M200,54 C200,78 150,82 130,108" fill="none" stroke="#c9700a" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#ah)"/>

  <!-- Flock boundary -->
  <rect x="12" y="108" width="740" height="92" rx="12" fill="none" stroke="#2563a8" stroke-width="1.5" stroke-dasharray="6 5"/>
  <text x="22" y="124" font-family="ui-monospace,Menlo,monospace" font-size="11.5" letter-spacing="0.5" fill="#2563a8">FLOCK — each box is a correct hash</text>

  <!-- region labels -->
  <text x="156" y="224" text-anchor="middle" font-size="12.5" fill="#516072">Winternitz chain ·66</text>
  <text x="356" y="224" text-anchor="middle" font-size="12.5" fill="#516072">leaf</text>
  <text x="582" y="224" text-anchor="middle" font-size="12.5" fill="#516072">Merkle path ·18</text>

  <!-- boxes: c1 c2 c3 LEAF m1 m2 ROOT -->
  <g font-family="ui-monospace,Menlo,monospace" font-size="13" text-anchor="middle" fill="#182430">
    <rect x="30"  y="142" width="72" height="46" rx="8" fill="#eaf1fa" stroke="#2563a8" stroke-width="1.6"/><text x="66"  y="170">h</text>
    <rect x="138" y="142" width="72" height="46" rx="8" fill="#eaf1fa" stroke="#2563a8" stroke-width="1.6"/><text x="174" y="170">h</text>
    <rect x="246" y="142" width="72" height="46" rx="8" fill="#eaf1fa" stroke="#2563a8" stroke-width="1.6"/><text x="282" y="170">h</text>
    <rect x="354" y="142" width="72" height="46" rx="8" fill="#eaf1fa" stroke="#2563a8" stroke-width="1.6"/><text x="390" y="170">leaf</text>
    <rect x="462" y="142" width="72" height="46" rx="8" fill="#eaf1fa" stroke="#2563a8" stroke-width="1.6"/><text x="498" y="170">h</text>
    <rect x="570" y="142" width="72" height="46" rx="8" fill="#eaf1fa" stroke="#2563a8" stroke-width="1.6"/><text x="606" y="170">h</text>
    <rect x="672" y="142" width="80" height="46" rx="8" fill="#fbefdd" stroke="#c9700a" stroke-width="1.8"/><text x="712" y="170" fill="#8a4d06">root</text>
  </g>

  <!-- glue arrows between boxes -->
  <g stroke="#c9700a" stroke-width="2" fill="none">
    <path d="M102,165 L134,165" marker-end="url(#ah)"/>
    <path d="M210,165 L242,165" marker-end="url(#ah)"/>
    <path d="M318,165 L350,165" marker-end="url(#ah)"/>
    <path d="M426,165 L458,165" marker-end="url(#ah)"/>
    <path d="M534,165 L566,165" marker-end="url(#ah)"/>
    <path d="M642,165 L668,165" marker-end="url(#ah)"/>
  </g>

  <!-- pins -->
  <g font-size="11.5" fill="#8a4d06">
    <path d="M66,142 L66,128" stroke="#c9700a" stroke-width="1.6"/>
    <text x="66" y="124" text-anchor="middle">start = IV</text>
    <path d="M390,188 L390,248" stroke="#c9700a" stroke-width="1.6" stroke-dasharray="3 3"/>
    <text x="390" y="264" text-anchor="middle">domain fixed (BLAKE3)</text>
    <text x="712" y="208" text-anchor="middle">= your public root</text>
  </g>

  <!-- legend -->
  <g font-size="13" fill="#516072">
    <rect x="30" y="300" width="26" height="16" rx="4" fill="#eaf1fa" stroke="#2563a8" stroke-width="1.6"/>
    <text x="66" y="313" >blue box — a hash, proven correct by Flock</text>
    <line x1="404" y1="308" x2="430" y2="308" stroke="#c9700a" stroke-width="3"/>
    <path d="M430,305 l6,3 l-6,3 z" fill="#c9700a"/>
    <text x="444" y="313">amber arrow / pin — a link, proven by the glue</text>
  </g>
</svg>
