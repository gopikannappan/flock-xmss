<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 764 350" font-family="system-ui,-apple-system,Segoe UI,Roboto,sans-serif">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#c9700a"/>
    </marker>
  </defs>

  <!-- self-contained background (readable on light and dark GitHub themes) -->
  <rect x="0.5" y="0.5" width="763" height="349" rx="14" fill="#ffffff" stroke="#dfe5ec"/>

  <!-- message-binding callout -->
  <rect x="150" y="16" width="330" height="34" rx="8" fill="#fbefdd" stroke="#c9700a"/>
  <text x="315" y="38" text-anchor="middle" font-size="13" fill="#8a4d06">the message decides how far each chain walks</text>
  <path d="M215,50 C215,74 185,80 172,100" fill="none" stroke="#c9700a" stroke-width="2" stroke-dasharray="4 3" marker-end="url(#ah)"/>

  <!-- Flock label (short, top-left, outside the boundary) -->
  <text x="14" y="94" font-family="ui-monospace,Menlo,monospace" font-size="12" letter-spacing="0.5" fill="#2563a8">Flock</text>

  <!-- Flock boundary -->
  <rect x="12" y="100" width="740" height="98" rx="12" fill="none" stroke="#2563a8" stroke-width="1.5" stroke-dasharray="6 5"/>

  <!-- IV pin (above the first box, clear of the Flock label) -->
  <g font-size="11.5" fill="#8a4d06">
    <text x="66" y="124" text-anchor="middle">start = IV</text>
    <path d="M66,128 L66,136" stroke="#c9700a" stroke-width="1.6"/>
  </g>

  <!-- boxes: c1 c2 c3 LEAF m1 m2 ROOT -->
  <g font-family="ui-monospace,Menlo,monospace" font-size="13" text-anchor="middle" fill="#182430">
    <rect x="30"  y="136" width="72" height="46" rx="8" fill="#eaf1fa" stroke="#2563a8" stroke-width="1.6"/><text x="66"  y="164">h</text>
    <rect x="138" y="136" width="72" height="46" rx="8" fill="#eaf1fa" stroke="#2563a8" stroke-width="1.6"/><text x="174" y="164">h</text>
    <rect x="246" y="136" width="72" height="46" rx="8" fill="#eaf1fa" stroke="#2563a8" stroke-width="1.6"/><text x="282" y="164">h</text>
    <rect x="354" y="136" width="72" height="46" rx="8" fill="#eaf1fa" stroke="#2563a8" stroke-width="1.6"/><text x="390" y="164">leaf</text>
    <rect x="462" y="136" width="72" height="46" rx="8" fill="#eaf1fa" stroke="#2563a8" stroke-width="1.6"/><text x="498" y="164">h</text>
    <rect x="570" y="136" width="72" height="46" rx="8" fill="#eaf1fa" stroke="#2563a8" stroke-width="1.6"/><text x="606" y="164">h</text>
    <rect x="672" y="136" width="80" height="46" rx="8" fill="#fbefdd" stroke="#c9700a" stroke-width="1.8"/><text x="712" y="164" fill="#8a4d06">root</text>
  </g>

  <!-- glue arrows between boxes -->
  <g stroke="#c9700a" stroke-width="2" fill="none">
    <path d="M102,159 L134,159" marker-end="url(#ah)"/>
    <path d="M210,159 L242,159" marker-end="url(#ah)"/>
    <path d="M318,159 L350,159" marker-end="url(#ah)"/>
    <path d="M426,159 L458,159" marker-end="url(#ah)"/>
    <path d="M534,159 L566,159" marker-end="url(#ah)"/>
    <path d="M642,159 L668,159" marker-end="url(#ah)"/>
  </g>

  <!-- root pin (glue) -->
  <text x="712" y="204" text-anchor="middle" font-size="11.5" fill="#8a4d06">= your public root</text>

  <!-- region labels (own row, below the boundary) -->
  <g font-size="12.5" fill="#516072" text-anchor="middle">
    <text x="174" y="226">Winternitz chain &#183;66</text>
    <text x="390" y="226">leaf</text>
    <text x="607" y="226">Merkle path &#183;18</text>
  </g>

  <!-- domain pin (glue), stacked under the leaf label -->
  <text x="390" y="246" text-anchor="middle" font-size="11.5" fill="#8a4d06">domain fixed (BLAKE3)</text>

  <!-- legend -->
  <g font-size="13" fill="#516072">
    <rect x="60" y="298" width="26" height="16" rx="4" fill="#eaf1fa" stroke="#2563a8" stroke-width="1.6"/>
    <text x="96" y="311">blue box &#8212; a hash, proven correct by Flock</text>
    <line x1="430" y1="306" x2="456" y2="306" stroke="#c9700a" stroke-width="3"/>
    <path d="M456,303 l6,3 l-6,3 z" fill="#c9700a"/>
    <text x="470" y="311">amber arrow / pin &#8212; a link, proven by the glue</text>
  </g>
</svg>
